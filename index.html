<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Formation & Fill Gap Pro - Touch Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        #range-screen, #main-content, #print-section { display: none; }
        #timer-bar { transition: width 1s linear; }
        .correct-flash { animation: flash-green 0.5s; }
        .wrong-flash { animation: flash-red 0.5s; }
        @keyframes flash-green { 0% { background-color: rgba(16, 185, 129, 0.2); } 100% { background-color: transparent; } }
        @keyframes flash-red { 0% { background-color: rgba(220, 38, 38, 0.2); } 100% { background-color: transparent; } }

        button, input, label {
            min-height: 48px;
            touch-action: manipulation;
        }

        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; }
            #main-content, #range-screen, #lock-screen { display: none !important; }
            #print-section { display: block !important; padding: 20mm; font-size: 13pt; line-height: 1.6; }
            .print-question { margin-bottom: 35px; page-break-inside: avoid; }
            .print-keyword { font-weight: bold; margin: 8px 0; }
            .print-line { border-bottom: 1px solid #000; height: 30px; width: 100%; margin-top: 5px; }
            .page-break { page-break-before: always; }
            .print-header { border-bottom: 2px solid #000; margin-bottom: 30px; padding-bottom: 10px; font-weight: bold; font-size: 18pt; text-align: center; }
            .print-answer-item { margin-bottom: 20px; page-break-inside: avoid; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start md:justify-center p-4 pt-6 md:p-8 selection:bg-sky-500/30">

    <div id="lock-screen" class="w-full max-w-md bg-slate-900 p-6 md:p-8 rounded-[2rem] border border-slate-800 shadow-2xl text-center my-auto">
        <div class="text-4xl md:text-5xl mb-4">🔐</div>
        <h2 class="text-xl md:text-2xl font-bold mb-6 text-sky-400">Password </h2>
        <input type="password" id="pass-input" inputmode="numeric" pattern="[0-9]*" class="w-full bg-slate-800 border-2 border-slate-700 p-3 md:p-4 rounded-xl text-center text-xl md:text-2xl mb-4 outline-none focus:border-sky-500 text-white" placeholder="Enter password here ...">
        <button onclick="checkPass()" class="w-full bg-sky-500 py-3 md:py-4 rounded-xl font-bold hover:bg-sky-600 active:scale-[0.98] transition-all text-white">START</button>
    </div>

    <div id="range-screen" class="w-full max-w-md bg-slate-900 p-6 md:p-8 rounded-[2rem] border border-slate-800 shadow-2xl text-center my-auto">
        <h2 class="text-xl md:text-2xl font-bold mb-6 text-emerald-400">Set up your lesson </h2>
        
        <label class="block mb-6 bg-slate-800 p-4 rounded-xl cursor-pointer border border-dashed border-slate-600 hover:bg-slate-700 active:bg-slate-700/50 transition-all">
            <span id="file-status" class="text-sm md:text-base">📁 Load file source (csv) </span>
            <input type="file" id="csv-file" accept=".csv" class="hidden">
        </label>
        
        <div class="grid grid-cols-2 gap-4 mb-4 text-sm">
            <div>
                <span class="text-xs text-slate-500 block mb-1 uppercase">From question </span>
                <input type="number" id="range-start" inputmode="numeric" class="w-full bg-slate-800 p-3 rounded-xl text-center border border-slate-700 font-bold text-white" value="1">
            </div>
            <div>
                <span class="text-xs text-slate-500 block mb-1 uppercase">To question (Max: <span id="max-count">0</span>)</span>
                <input type="number" id="range-end" inputmode="numeric" class="w-full bg-slate-800 p-3 rounded-xl text-center border border-slate-700 font-bold text-white" value="10">
            </div>
        </div>

        <div class="mb-6">
            <span class="text-xs text-rose-400 block mb-1 uppercase font-bold">Time per question (Seconds)</span>
            <input type="number" id="time-limit" inputmode="numeric" class="w-full bg-rose-950/30 p-3 rounded-xl text-center border border-rose-900/50 font-bold text-rose-400 outline-none" value="300">
        </div>

        <div class="flex flex-col sm:flex-row gap-3">
            <button onclick="exportPDF()" class="w-full sm:flex-1 bg-slate-700 py-3.5 rounded-xl font-bold hover:bg-slate-600 active:scale-[0.98] transition-all text-xs md:text-sm uppercase text-white">Export PDF</button>
            <button onclick="startGame()" class="w-full sm:flex-1 bg-emerald-500 py-3.5 rounded-xl font-bold hover:bg-emerald-600 active:scale-[0.98] transition-all text-xs md:text-sm uppercase text-white">Start your lesson</button>
        </div>
    </div>

    <div id="main-content" class="w-full max-w-2xl flex flex-col justify-between">
        <div class="w-full mb-3">
            <div class="flex justify-between items-center mb-2 px-1">
                <span id="progress-text" class="text-xs md:text-sm text-slate-500 font-mono">Question: 1/10</span>
                <span id="score-text" class="text-xs md:text-sm text-emerald-400 font-bold uppercase tracking-widest">Right: 0</span>
            </div>

            <div class="px-1">
                <div class="flex justify-between text-[10px] md:text-xs text-slate-400 mb-1 font-bold uppercase">
                    <span>⏱ Time </span>
                    <span id="timer-text" class="text-rose-400">150s</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
                    <div id="timer-bar" class="bg-rose-500 h-1.5 rounded-full" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 p-5 md:p-8 rounded-[2rem] border border-slate-800 shadow-xl flex flex-col justify-between flex-grow">
            <div class="flex flex-col justify-center flex-grow min-h-[140px] md:min-h-[180px]">
                <p id="question-text" class="text-lg md:text-2xl font-medium leading-relaxed mb-4 text-white text-center whitespace-pre-wrap break-words"></p>
                <div class="text-center mb-4">
                    <span id="keyword-text" class="inline-block bg-indigo-900/40 text-indigo-300 border border-indigo-500/30 px-4 py-1.5 md:px-6 md:py-2 rounded-full font-bold tracking-wider text-sm md:text-lg uppercase"></span>
                </div>
            </div>
            
            <div class="w-full mt-auto">
                <input type="text" id="user-input" 
                       class="w-full bg-slate-950 border-2 border-slate-700 p-4 rounded-xl text-lg md:text-xl text-center text-white outline-none focus:border-sky-500 transition-all mb-3 appearance-none" 
                       placeholder="Enter your answer here ..." 
                       autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

                <div id="explanation" class="hidden my-3 p-4 rounded-xl bg-slate-950 border border-slate-800 text-xs md:text-sm leading-relaxed text-slate-300 whitespace-pre-wrap break-words max-h-[150px] overflow-y-auto"></div>

                <div class="flex gap-3">
                    <button id="btn-check" onclick="checkAnswer()" class="w-full bg-sky-500 py-4 rounded-xl font-bold hover:bg-sky-600 active:scale-[0.98] transition-all text-base md:text-lg shadow-lg text-white">CHECK</button>
                    <button id="btn-next" onclick="nextQuestion()" class="hidden w-full bg-emerald-600 py-4 rounded-xl font-bold hover:bg-emerald-700 active:scale-[0.98] transition-all text-base md:text-lg shadow-lg text-white">NEXT →</button>
                </div>
            </div>
        </div>
    </div>

    <div id="print-section"></div>

    <script>
        let fullData = [], currentSession = [], index = 0, score = 0;
        let timerInterval, timePerQuestion = 150, timeLeft = 0;
        const SECRET_PASS = "1234";

        function checkPass() {
            if (document.getElementById('pass-input').value === SECRET_PASS) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('range-screen').style.display = 'block';
            } else {
                alert("Wrong password!");
            }
        }

        function parseCSVLine(text) {
            let p = '', r = [];
            let q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') { q = !q; }
                else if (c === ',' && !q) { r.push(p); p = ''; }
                else { p += c; }
            }
            r.push(p);
            return r;
        }

        document.getElementById('csv-file').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const lines = event.target.result.split(/\r?\n/);
                fullData = lines.map(line => {
                    if (!line.trim()) return null;
                    const cols = parseCSVLine(line);
                    return { 
                        q: cols[0]?.trim().replace(/^"|"$/g, ''),       
                        keyword: cols[1]?.trim().replace(/^"|"$/g, ''), 
                        ans: cols[2]?.trim().replace(/^"|"$/g, ''),     
                        exp: cols[3]?.trim().replace(/^"|"$/g, '')      
                    };
                }).filter(item => item && item.q && item.ans);
                
                document.getElementById('file-status').innerText = `✅ You have just loaded ${fullData.length} questions`;
                document.getElementById('max-count').innerText = fullData.length;
                document.getElementById('range-end').value = fullData.length;
            };
            reader.readAsText(e.target.files[0]);
        });

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function getRangeData() {
            const start = parseInt(document.getElementById('range-start').value) - 1;
            const end = parseInt(document.getElementById('range-end').value);
            if (isNaN(start) || isNaN(end) || start < 0 || end > fullData.length) return [];
            return fullData.slice(start, end);
        }

        function exportPDF() {
            let data = getRangeData();
            if (data.length === 0) return alert("Please load valid file!");
            
            shuffle(data);
            const printDiv = document.getElementById('print-section');
            let content = `<div class="print-header">EXERCISES</div>`;
            
            data.forEach((item, i) => {
                content += `
                    <div class="print-question">
                        ${i + 1}. ${item.q}<br>
                        <div class="print-keyword">(${item.keyword})</div>
                        <div class="print-line"></div>
                    </div>
                `;
            });

            content += `<div class="page-break"></div><div class="print-header">Detail answer explanation</div>`;
            data.forEach((item, i) => {
                content += `
                    <div class="print-answer-item">
                        <strong>${i + 1}. ${item.ans}</strong><br>
                        <span style="font-style: italic; color: #444;">${item.exp || ""}</span>
                    </div>
                `;
            });

            printDiv.innerHTML = content;
            window.print();
        }

        function startGame() {
            currentSession = getRangeData();
            timePerQuestion = parseInt(document.getElementById('time-limit').value) || 150;
            
            if (currentSession.length === 0) return alert("Please load valid file!");
            
            shuffle(currentSession);
            index = 0; score = 0;
            
            document.getElementById('range-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            showQuestion();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = timePerQuestion;
            updateTimerUI();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('user-input').readOnly = true;
                    showFeedback(false, "Time's up for the question!");
                }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-text').innerText = timeLeft + "s";
            const percent = (timeLeft / timePerQuestion) * 100;
            document.getElementById('timer-bar').style.width = percent + "%";
            document.getElementById('timer-bar').className = percent <= 30 ? "bg-red-600 h-1.5 rounded-full" : "bg-rose-500 h-1.5 rounded-full";
        }

        function showQuestion() {
            const current = currentSession[index];
            document.getElementById('question-text').innerText = current.q;
            
            const kwEl = document.getElementById('keyword-text');
            if(current.keyword) {
                kwEl.innerText = `(${current.keyword})`;
                kwEl.style.display = "inline-block";
            } else {
                kwEl.style.display = "none";
            }

            document.getElementById('progress-text').innerText = `CÂU: ${index + 1}/${currentSession.length}`;
            
            const inputEl = document.getElementById('user-input');
            inputEl.value = "";
            inputEl.readOnly = false;
            inputEl.className = "w-full bg-slate-950 border-2 border-slate-700 p-4 rounded-xl text-lg text-center text-white outline-none focus:border-sky-500 transition-all mb-3 appearance-none";
            
            document.getElementById('explanation').classList.add('hidden');
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-check').classList.remove('hidden');

            startTimer();
            
            if (window.innerWidth > 768) {
                inputEl.focus();
            }
        }

        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !document.getElementById('btn-check').classList.contains('hidden')) {
                event.preventDefault();
                document.getElementById("user-input").blur();
                checkAnswer();
            }
        });

        function checkAnswer() {
            clearInterval(timerInterval);
            
            const userVal = document.getElementById('user-input').value;
            const correctVal = currentSession[index].ans;
            const cleanText = (str) => str.toLowerCase().trim().replace(/[.\?]$/, '').replace(/\s+/g, ' ');

            const isCorrect = cleanText(userVal) === cleanText(correctVal);
            showFeedback(isCorrect);
        }

        function showFeedback(isCorrect, customTitle = null) {
            const current = currentSession[index];
            const inputEl = document.getElementById('user-input');
            const expDiv = document.getElementById('explanation');
            
            inputEl.readOnly = true;
            document.getElementById('btn-check').classList.add('hidden');

            if (isCorrect) {
                score++;
                inputEl.classList.replace('border-slate-700', 'border-emerald-500');
                inputEl.classList.add('text-emerald-400');
                
                expDiv.innerHTML = `<strong class="text-emerald-400">RIGHT! 🌟</strong><br><span class="mt-1 block">${current.exp || ""}</span>`;
                expDiv.className = "my-3 p-4 rounded-xl bg-emerald-900/20 border border-emerald-500/30 text-xs md:text-sm leading-relaxed text-emerald-100 whitespace-pre-wrap break-words max-h-[150px] overflow-y-auto";
                
                document.getElementById('main-content').classList.add('correct-flash');
                setTimeout(() => document.getElementById('main-content').classList.remove('correct-flash'), 500);
            } else {
                inputEl.classList.replace('border-slate-700', 'border-red-500');
                inputEl.classList.add('text-red-400');
                
                const title = customTitle ? customTitle : "WRONG ❌";
                expDiv.innerHTML = `<strong class="text-red-400">${title}</strong><br><strong class="text-sky-400 block mt-1">RIGHT ANSWER: ${current.ans}</strong><span class="mt-1 block">${current.exp || ""}</span>`;
                expDiv.className = "my-3 p-4 rounded-xl bg-red-900/20 border border-red-500/30 text-xs md:text-sm leading-relaxed text-red-100 whitespace-pre-wrap break-words max-h-[150px] overflow-y-auto";

                document.getElementById('main-content').classList.add('wrong-flash');
                setTimeout(() => document.getElementById('main-content').classList.remove('wrong-flash'), 500);
            }
            
            expDiv.classList.remove('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
            document.getElementById('score-text').innerText = `Right: ${score}`;
        }

        function nextQuestion() {
            index++;
            if (index < currentSession.length) {
                showQuestion();
            } else {
                clearInterval(timerInterval);
                alert(`CONGRATULATION! Your lesson have been finished.\nResults: ${score}/${currentSession.length}`);
                location.reload();
            }
        }
    </script>
</body>
</html>
